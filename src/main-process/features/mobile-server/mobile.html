<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#0d1117">
  <title>面试官助手</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0d1117;
      --surface:      #161b22;
      --surface2:     #1c2128;
      --border:       #30363d;
      --text:         #e6edf3;
      --text-muted:   #8b949e;
      --blue:         #58a6ff;
      --blue-dim:     #1c2a4a;
      --blue-border:  #264f78;
      --green:        #3fb950;
      --red:          #f85149;
      --purple:       #bc8cff;
      --yellow:       #d29922;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100dvh; /* dynamic viewport height for mobile browsers */
    }

    /* ── Header ──────────────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background:
        linear-gradient(135deg, rgba(124,140,248,0.08) 0%, transparent 100%),
        var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 10px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .header-title {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
      transition: all 0.3s;
    }

    .status-pill.connected {
      color: var(--green);
      border-color: rgba(63, 185, 80, 0.3);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--red);
      transition: background 0.3s;
      flex-shrink: 0;
    }

    .status-pill.connected .status-dot { background: var(--green); }

    /* "连接中" / "重连中" — pulse the whole pill so the user can see activity. */
    .status-pill.connecting {
      color: var(--yellow);
      border-color: rgba(210, 153, 34, 0.3);
      animation: pulse-connect 1.5s ease-in-out infinite;
    }
    .status-pill.connecting .status-dot { background: var(--yellow); }

    @keyframes pulse-connect {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ── Messages ────────────────────────────────────────────────────────── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 12px 4px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    .messages:empty::after {
      content: '暂无消息\A截图或输入问题开始';
      display: block;
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      white-space: pre-line;
      line-height: 1.8;
      margin: auto;
      /* Inline SVG: a muted chat bubble with three dots, sitting above the text
         in the top padding region. Themed to --text-muted (#8b949e). */
      padding-top: 68px;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='64' height='64' viewBox='0 0 24 24' fill='none' stroke='%238b949e' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'><path d='M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z'/><circle cx='9' cy='12' r='0.6' fill='%238b949e' stroke='none'/><circle cx='12' cy='12' r='0.6' fill='%238b949e' stroke='none'/><circle cx='15' cy='12' r='0.6' fill='%238b949e' stroke='none'/></svg>");
      background-repeat: no-repeat;
      background-position: center top;
      background-size: 56px 56px;
      opacity: 0.85;
    }

    /* Message types */
    .msg { display: flex; flex-direction: column; }
    .msg.center { align-items: center; }
    .msg.left  { align-items: flex-start; max-width: 88%; }
    .msg.right { align-items: flex-end;   align-self: flex-end; max-width: 88%; }

    .msg-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 3px;
      padding: 0 4px;
    }

    .msg.right .msg-label { color: var(--blue); text-align: right; }

    .msg-bubble {
      padding: 8px 12px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }

    /* System */
    .msg.center .msg-bubble {
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      padding: 3px 8px;
    }

    /* Transcript */
    .msg.left .msg-bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* Partial transcript */
    .msg.left.partial .msg-bubble {
      background: var(--surface2);
      border-color: var(--border);
      border-style: dashed;
      color: var(--text-muted);
      font-style: italic;
    }

    /* AI response */
    .msg.right .msg-bubble {
      background: var(--blue-dim);
      border: 1px solid var(--blue-border);
      border-bottom-right-radius: 4px;
      white-space: pre-wrap;
    }

    /* Streaming cursor */
    .streaming .msg-bubble::after {
      content: '▋';
      color: var(--blue);
      animation: blink 0.9s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* ── Input area ──────────────────────────────────────────────────────── */
    .input-area {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 8px 12px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .context-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 9px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      resize: none;
      min-height: 38px;
      max-height: 100px;
      overflow-y: auto;
      line-height: 1.4;
      -webkit-appearance: none;
      transition: border-color 0.2s;
    }

    .context-input::placeholder { color: var(--text-muted); }
    .context-input:focus { border-color: var(--blue); }

    .send-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: var(--blue);
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.2s;
    }

    .send-btn:active { opacity: 0.7; }

    .send-btn svg { width: 18px; height: 18px; }

    /* ── Toolbar ─────────────────────────────────────────────────────────── */
    .toolbar {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 10px 8px;
      padding-bottom: max(10px, env(safe-area-inset-bottom, 10px));
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tool-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 8px 14px;
      border: none;
      background: transparent;
      color: var(--text);
      border-radius: 14px;
      cursor: pointer;
      position: relative;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: background 0.15s;
      min-width: 68px;
    }

    .tool-btn:active { background: var(--border); }

    .tool-btn svg {
      width: 26px;
      height: 26px;
      flex-shrink: 0;
    }

    .tool-btn .btn-label {
      font-size: 11px;
      color: var(--text-muted);
      transition: color 0.2s;
    }

    .tool-btn.screenshot svg { color: var(--blue); }
    .tool-btn.ask-ai     svg { color: var(--purple); }
    .tool-btn.autoscroll svg { color: var(--green); }
    .tool-btn.clear      svg { color: var(--text-muted); }
    .tool-btn.autoscroll.off svg, .tool-btn.autoscroll.off .btn-label { opacity: 0.45; }

    /* Screenshot badge */
    .ss-badge {
      position: absolute;
      top: 4px;
      right: 6px;
      background: var(--blue);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      min-width: 16px;
      height: 16px;
      border-radius: 10px;
      padding: 0 4px;
      display: none;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .ss-badge.show { display: flex; }

    /* ── Toast ───────────────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 9px 16px;
      border-radius: 10px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      z-index: 999;
      max-width: 82vw;
      text-align: center;
      backdrop-filter: blur(8px);
    }

    .toast.error  { border-color: rgba(248,81,73,0.4); color: #ff8080; }
    .toast.show   { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Scrollbar styling ───────────────────────────────────────────────── */
    .messages::-webkit-scrollbar { width: 3px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Allow selecting + copying transcript text on mobile (the toolbar buttons
       set user-select:none so taps don't highlight them; re-enable it on the
       message list itself). */
    .messages, .messages * {
      user-select: text;
      -webkit-user-select: text;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="header-logo">✦</div>
      <span class="header-title">面试官助手</span>
    </div>
    <div class="header-right">
      <div class="status-pill connecting" id="statusPill">
        <div class="status-dot"></div>
        <span id="statusText">连接中</span>
      </div>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Input -->
  <div class="input-area">
    <textarea
      class="context-input"
      id="contextInput"
      placeholder="输入问题或上下文…"
      rows="1"
    ></textarea>
    <button class="send-btn" onclick="askAi()" title="问 AI" aria-label="问 AI">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">

    <button class="tool-btn screenshot" id="btnScreenshot" onclick="takeScreenshot()" aria-label="截图">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <span class="btn-label">截图</span>
      <div class="ss-badge" id="ssBadge">0</div>
    </button>

    <button class="tool-btn ask-ai" id="btnAskAi" onclick="askAi()" aria-label="问 AI">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 2l2.09 6.26L20.18 10l-4.73 4.74 1.18 6.26L12 18l-4.63 3 1.18-6.26L3.82 10l6.09-1.74z"/>
      </svg>
      <span class="btn-label">问 AI</span>
    </button>

    <button class="tool-btn autoscroll" id="btnAutoScroll" onclick="toggleAutoScroll()" aria-pressed="true" aria-label="自动滚动">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="7 13 12 18 17 13"/>
        <line x1="12" y1="18" x2="12" y2="4"/>
      </svg>
      <span class="btn-label" id="autoScrollLabel">自动滚动</span>
    </button>

    <button class="tool-btn clear" id="btnClear" onclick="clearConversation()" aria-label="清空对话">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
        <path d="M10 11v6M14 11v6"/>
        <path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>
      </svg>
      <span class="btn-label">清空</span>
    </button>

  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    'use strict';

    // ── State ─────────────────────────────────────────────────────────────────

    let ws              = null;
    let isConnected     = false;
    let streamBuffer    = '';
    let streamEl        = null;   // current streaming AI message element
    let screenshotsCount = 0;
    let toastTimer      = null;
    let reconnectTimer  = null;

    // ── DOM refs ──────────────────────────────────────────────────────────────

    const messagesEl   = document.getElementById('messages');
    const statusPill   = document.getElementById('statusPill');
    const statusText   = document.getElementById('statusText');
    const ssBadge      = document.getElementById('ssBadge');
    const contextInput = document.getElementById('contextInput');
    const toastEl      = document.getElementById('toast');

    // ── Auto-resize textarea ──────────────────────────────────────────────────

    contextInput.addEventListener('input', () => {
      contextInput.style.height = 'auto';
      contextInput.style.height = Math.min(contextInput.scrollHeight, 100) + 'px';
    });

    contextInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        askAi();
      }
    });

    // ── WebSocket connection ──────────────────────────────────────────────────

    function connect() {
      clearTimeout(reconnectTimer);

      // Mark the pill as "connecting" while we attempt / wait for the socket.
      statusPill.classList.remove('connected');
      statusPill.classList.add('connecting');
      statusText.textContent = '连接中';

      try {
        const wsScheme = location.protocol === 'https:' ? 'wss' : 'ws';
        ws = new WebSocket(`${wsScheme}://${location.host}`);
      } catch (err) {
        scheduleReconnect();
        return;
      }

      ws.onopen = () => {
        isConnected = true;
        statusPill.classList.remove('connecting');
        statusPill.classList.add('connected');
        statusText.textContent = '已连接';
      };

      ws.onclose = () => {
        isConnected = false;
        statusPill.classList.remove('connected');
        statusPill.classList.add('connecting');
        statusText.textContent = '重连中';
        scheduleReconnect();
      };

      ws.onerror = () => {
        // onclose fires after onerror, handles reconnect
      };

      ws.onmessage = (e) => {
        if (typeof e.data !== 'string') return;
        try {
          const { channel, data } = JSON.parse(e.data);
          handleEvent(channel, data || {});
        } catch (_) {}
      };
    }

    function scheduleReconnect() {
      reconnectTimer = setTimeout(connect, 3000);
    }

    // ── Event handler ─────────────────────────────────────────────────────────

    function handleEvent(channel, data) {
      switch (channel) {

        case 'connected':
          screenshotsCount = data.screenshotsCount || 0;
          updateBadge();
          addSysMsg(`已连接 · 已有 ${screenshotsCount} 张截图`);
          break;

        case 'screenshot-taken-stealth':
          screenshotsCount = data.count || 0;
          updateBadge();
          addSysMsg(`📸 已截取第 ${screenshotsCount} 张截图`);
          break;

        case 'ai-stream-start':
          streamBuffer = '';
          streamEl = addAiMsg('');
          streamEl.classList.add('streaming');
          break;

        case 'ai-stream-chunk':
          if (streamEl) {
            streamBuffer += (data.text || '');
            streamEl.querySelector('.msg-bubble').textContent = streamBuffer;
            scrollBottom();
          }
          break;

        case 'ai-stream-end':
          if (streamEl) {
            streamEl.classList.remove('streaming');
            streamEl = null;
          }
          break;

        case 'vosk-final': {
          const label = data.source === 'system' ? '主机' : '你（麦克风）';
          addTranscriptMsg(data.text || '', label);
          break;
        }

        case 'clear-done':
          clearMessages();
          addSysMsg('💬 对话已清空');
          break;

        case 'error':
          showToast(data.message || '未知错误', 'error');
          break;
      }
    }

    // ── Send helpers ──────────────────────────────────────────────────────────

    function sendJson(obj) {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(obj));
      }
    }

    // ── Actions ───────────────────────────────────────────────────────────────

    function takeScreenshot() {
      if (!isConnected) { showToast('未连接', 'error'); return; }
      sendJson({ type: 'take-screenshot' });
    }

    function askAi() {
      if (!isConnected) { showToast('未连接', 'error'); return; }
      const contextString = contextInput.value.trim();
      sendJson({ type: 'ask-ai', contextString });

      if (contextString) {
        addTranscriptMsg(contextString, '你（输入）');
        contextInput.value = '';
        contextInput.style.height = 'auto';
      }
    }

    function clearConversation() {
      if (!isConnected) { showToast('未连接', 'error'); return; }
      sendJson({ type: 'clear-conversation' });
    }

    // ── DOM helpers ───────────────────────────────────────────────────────────

    function addSysMsg(text) {
      const el = document.createElement('div');
      el.className = 'msg center';
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = text;
      el.appendChild(bubble);
      messagesEl.appendChild(el);
      scrollBottom();
      return el;
    }

    function addTranscriptMsg(text, label) {
      const el = document.createElement('div');
      el.className = 'msg left';

      const lbl = document.createElement('div');
      lbl.className = 'msg-label';
      lbl.textContent = label;

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = text;

      el.appendChild(lbl);
      el.appendChild(bubble);
      messagesEl.appendChild(el);
      scrollBottom();
      return el;
    }

    function addAiMsg(text) {
      const el = document.createElement('div');
      el.className = 'msg right';

      const lbl = document.createElement('div');
      lbl.className = 'msg-label';
      lbl.textContent = '面试官助手';

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.textContent = text;

      el.appendChild(lbl);
      el.appendChild(bubble);
      messagesEl.appendChild(el);
      scrollBottom();
      return el;
    }

    function clearMessages() {
      messagesEl.innerHTML = '';
      streamEl     = null;
      streamBuffer = '';
      screenshotsCount = 0;
      updateBadge();
    }

    const AUTOSCROLL_KEY = 'open-cluely.autoScrollEnabled';
    function autoScrollEnabled() {
      try { return localStorage.getItem(AUTOSCROLL_KEY) !== '0'; } catch (_) { return true; }
    }
    function setAutoScrollEnabled(value) {
      try { localStorage.setItem(AUTOSCROLL_KEY, value ? '1' : '0'); } catch (_) {}
      paintAutoScrollBtn();
    }
    function paintAutoScrollBtn() {
      const btn = document.getElementById('btnAutoScroll');
      const label = document.getElementById('autoScrollLabel');
      if (!btn) return;
      const enabled = autoScrollEnabled();
      btn.setAttribute('aria-pressed', enabled ? 'true' : 'false');
      btn.classList.toggle('off', !enabled);
      if (label) label.textContent = enabled ? '自动滚动' : '停止滚动';
    }
    function toggleAutoScroll() { setAutoScrollEnabled(!autoScrollEnabled()); }

    function scrollBottom() {
      if (!autoScrollEnabled()) return;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function updateBadge() {
      if (screenshotsCount > 0) {
        ssBadge.textContent = screenshotsCount;
        ssBadge.classList.add('show');
      } else {
        ssBadge.classList.remove('show');
      }
    }

    function showToast(msg, type = '') {
      toastEl.textContent = msg;
      toastEl.className   = `toast ${type}`;
      // force reflow to restart transition
      void toastEl.offsetWidth;
      toastEl.classList.add('show');

      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toastEl.classList.remove('show');
      }, 3500);
    }

    // ── Boot ──────────────────────────────────────────────────────────────────

    paintAutoScrollBtn();
    connect();
  </script>
</body>
</html>
