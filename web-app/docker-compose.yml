# Run the Open-Cluely web edition.
#   cd web-app && docker compose up --build
# Requires DASHSCOPE_API_KEY in the environment or in web-app/.env (compose reads
# web-app/.env automatically for the interpolation below).
services:
  open-cluely-web:
    build:
      context: ..
      dockerfile: web-app/Dockerfile
    image: open-cluely-web:latest
    ports:
      - "8787:8787"
    environment:
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:?set DASHSCOPE_API_KEY in web-app/.env or the environment}
      PORT: "8787"
      # Offline mode: transcription via cloud Paraformer, speaker id via the local CAM++ sidecar.
      CAMPP_URL: http://campp-sidecar:10097
    depends_on:
      - campp-sidecar
    restart: unless-stopped

  # CAM++ speaker-diarization sidecar (offline single-room-mic mode only). The
  # image bakes in the CAM++ model so it starts ready. CPU-only is fine.
  campp-sidecar:
    build:
      context: ./deploy/campp-sidecar
    image: open-cluely-campp:latest
    ports:
      - "10097:10097"
    restart: unless-stopped
    # GPU is NOT required (per-utterance embeddings are light). To use one anyway,
    # install nvidia-container-toolkit and uncomment:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - { capabilities: [gpu] }
