<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>面试官 Copilot</title>
    <!-- Set the GLP theme on <html> BEFORE first paint to avoid a light/dark
         flash. Mirrors lib/useTheme.ts exactly: read localStorage key
         `glp-theme`; default to dark (the app's current look). -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('glp-theme');
          document.documentElement.dataset.theme = t === 'light' ? 'light' : 'dark';
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
    <!-- Desktop design tokens reference Bricolage Grotesque (display), Hanken
         Grotesk (body), JetBrains Mono (mono), Noto Sans SC (CJK). Preconnect +
         load them so --font-display / --font-body / --font-mono resolve. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=Hanken+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
